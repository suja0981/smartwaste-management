version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smart-waste-postgres
    environment:
      POSTGRES_USER: waste_user
      POSTGRES_PASSWORD: waste_password_dev
      POSTGRES_DB: smart_waste
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - smart-waste-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waste_user -d smart_waste"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional: pgAdmin for visual database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: smart-waste-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@smart-waste.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - smart-waste-net
    restart: unless-stopped

networks:
  smart-waste-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
